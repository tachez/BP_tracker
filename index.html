<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BP-трекер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background-color: #1a1c1e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            padding: 20px 16px 40px;
            color: #e8edf2;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.3px;
            margin-bottom: 12px;
        }

        .total-bp-card {
            background: #1e2124;
            border-radius: 20px;
            padding: 14px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .total-bp-left {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .total-bp-label {
            font-size: 16px;
            color: #9aa3ae;
            font-weight: 500;
        }

        .total-bp-value {
            font-size: 32px;
            font-weight: 700;
            color: #F3CD49;
            letter-spacing: -0.5px;
        }

        .initial-bp-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #2a2e32;
            padding: 10px 14px;
            border-radius: 20px;
        }

        .initial-input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .initial-bp-label {
            font-size: 13px;
            color: #9aa3ae;
        }

        .initial-bp-input {
            background: #1e2124;
            border: 1px solid #3a3f44;
            border-radius: 28px;
            padding: 8px 12px;
            width: 90px;
            font-size: 16px;
            font-weight: 600;
            color: #F3CD49;
            text-align: center;
            font-family: inherit;
            outline: none;
        }

        .initial-bp-input:focus {
            border-color: #F3CD49;
        }

        .initial-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .initial-btn {
            background: #3a3f44;
            border: none;
            padding: 6px 12px;
            border-radius: 28px;
            font-size: 14px;
            font-weight: 600;
            color: #F3CD49;
            cursor: pointer;
            transition: 0.1s;
            min-width: 44px;
        }

        .initial-btn:active {
            background: #4f555b;
            transform: scale(0.96);
        }

        .initial-btn.small {
            padding: 6px 10px;
            font-size: 16px;
        }

        .vip-switch {
            display: flex;
            gap: 8px;
            background: #232628;
            padding: 4px;
            border-radius: 40px;
            margin-bottom: 24px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .vip-option {
            padding: 8px 20px;
            border-radius: 32px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            color: #9aa3ae;
            border: none;
            font-family: inherit;
            transition: 0.2s;
        }

        .vip-option.active {
            background: #F3CD49;
            color: #1a1c1e;
        }

        .tasks-list {
            margin-bottom: 32px;
            background: #1e2124;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 0.5px solid #2c3033;
            background-color: #1e2124;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            margin-top: 2px;
            flex-shrink: 0;
            cursor: pointer;
            accent-color: #F3CD49;
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            font-size: 15px;
            line-height: 1.4;
            color: #e8edf2;
            margin-bottom: 4px;
            display: block;
        }

        .task-bp {
            font-size: 12px;
            color: #F3CD49;
            font-weight: 500;
        }

        .auto-badge {
            font-size: 10px;
            background: #2a5f3a;
            color: #8bc34a;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
            display: inline-block;
        }

        .counters-section {
            background: #1e2124;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .counters-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ffffff;
            padding-bottom: 6px;
            border-bottom: 0.5px solid #2c3033;
        }

        .counter-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 0.5px solid #2c3033;
            gap: 12px;
            flex-wrap: wrap;
        }

        .counter-row:last-child {
            border-bottom: none;
        }

        .counter-info {
            flex: 2;
            min-width: 140px;
        }

        .counter-label {
            font-size: 15px;
            font-weight: 500;
            color: #e8edf2;
            display: block;
            margin-bottom: 2px;
        }

        .counter-target {
            font-size: 11px;
            color: #F3CD49;
        }

        .counter-controls-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #2a2e32;
            padding: 4px 8px;
            border-radius: 40px;
        }

        .counter-btn {
            background: #3a3f44;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .counter-btn:active {
            background: #4f555b;
            transform: scale(0.96);
        }

        .counter-value {
            min-width: 44px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: #F3CD49;
        }

        .counter-reset {
            background: #2c3033;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            color: #9aa3ae;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .counter-reset:active {
            background: #3a3f44;
            color: #F3CD49;
        }

        .reset-all-btn {
            background: #2c3033;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: #ff9f6e;
            font-size: 15px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }

        .reset-all-btn:active {
            background: #3a3f44;
            transform: scale(0.98);
        }

        .note {
            font-size: 11px;
            color: #6e7a8a;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>💰 BP-трекер</h1>
    </div>

    <div class="total-bp-card">
        <div class="total-bp-left">
            <span class="total-bp-label">Получено BP</span>
            <span class="total-bp-value" id="totalBpDisplay">0</span>
        </div>
        <div class="initial-bp-block">
            <div class="initial-input-row">
                <span class="initial-bp-label">Исходно BP</span>
                <input type="number" id="initialBpInput" class="initial-bp-input" value="0" step="1" min="0">
                <button class="initial-btn small" id="initialMinusBtn" title="Вычесть 1">−</button>
                <button class="initial-btn small" id="initialPlusBtn" title="Прибавить 1">+</button>
            </div>
            <div class="initial-buttons">
                <button class="initial-btn" id="initialAdd1Btn">+1</button>
                <button class="initial-btn" id="initialAdd2Btn">+2</button>
                <button class="initial-btn" id="initialAdd4Btn">+4</button>
                <button class="initial-btn" id="initialAdd8Btn">+8</button>
            </div>
        </div>
    </div>

    <div class="vip-switch">
        <button class="vip-option" data-vip="false">🔹 Без VIP</button>
        <button class="vip-option" data-vip="true">💎 С VIP</button>
    </div>

    <div class="tasks-list" id="tasksList"></div>

    <div class="counters-section">
        <div class="counters-title">📊 Счётчики прогресса</div>
        <div id="countersContainer"></div>
    </div>

    <button class="reset-all-btn" id="resetAllBtn">⟳ Сбросить всё</button>
    <div class="note">✓ Отмечайте задания вручную • Счётчики автоматически отмечают задание при достижении цели и снимают отметку при сбросе • Исходное BP не влияет на полученные BP</div>
</div>

<script>
    // Задания с привязкой к счётчикам
    const tasksData = [
        { id: null, text: "3 часа в онлайне (можно многократно)", bpBase: 2, bpVip: 4, autoCounter: null },
        { id: null, text: "Нули в казино", bpBase: 2, bpVip: 4, autoCounter: null },
        { id: "build", text: "25 действий на стройке", bpBase: 2, bpVip: 4, autoCounter: "build", required: 25 },
        { id: "port", text: "25 действий в порту", bpBase: 2, bpVip: 4, autoCounter: "port", required: 25 },
        { id: "mine", text: "25 действий в шахте", bpBase: 2, bpVip: 4, autoCounter: "mine", required: 25 },
        { id: "gym", text: "20 подходов в тренажерном зале", bpBase: 1, bpVip: 2, autoCounter: "gym", required: 20 },
        { id: null, text: "Успешная тренировка в тире", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: "post", text: "10 посылок на почте", bpBase: 1, bpVip: 2, autoCounter: "post", required: 10 },
        { id: null, text: "Купить лотерейный билет", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: "farm", text: "10 действий на ферме", bpBase: 1, bpVip: 2, autoCounter: "farm", required: 10 },
        { id: null, text: "Выкопать 1 сокровище (не мусор)", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: "skins", text: "5 раз снять 100% шкуру с животных", bpBase: 2, bpVip: 4, autoCounter: "skins", required: 5 },
        { id: "fish", text: "Поймать 20 рыб", bpBase: 4, bpVip: 8, autoCounter: "fish", required: 20 },
        { id: null, text: "Выполнить 3 заказа дальнобойщиком", bpBase: 2, bpVip: 4, autoCounter: null },
        { id: null, text: "2 круга на любом маршруте автобусника", bpBase: 2, bpVip: 4, autoCounter: null },
        { id: null, text: "Посетить любой сайт в браузере", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Зайти в любой канал в Brawl", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Поставить лайк любой анкете в Match", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Кинуть мяч питомцу 15 раз", bpBase: 2, bpVip: 4, autoCounter: null },
        { id: null, text: "15 выполненных питомцем команд", bpBase: 2, bpVip: 4, autoCounter: null },
        { id: null, text: "Ставка в колесе удачи (межсерверное колесо)", bpBase: 3, bpVip: 6, autoCounter: null },
        { id: null, text: "Сыграть в мафию в казино", bpBase: 3, bpVip: 6, autoCounter: null },
        { id: null, text: "Выиграть гонку в картинге", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Проехать 1 станцию на метро", bpBase: 2, bpVip: 4, autoCounter: null },
        { id: "clubQuests", text: "Выполнить 2 квеста любых клубов", bpBase: 4, bpVip: 8, autoCounter: "clubQuests", required: 2 },
        { id: null, text: "Починить деталь в автосервисе", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Забросить 2 мяча в баскетболе", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Забить 2 гола в футболе", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Победить в армрестлинге", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Победить в дартс", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Поиграть 1 минуту в волейбол", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Поиграть 1 минуту в настольный теннис", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Поиграть 1 минуту в большой теннис", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Сделать платеж по лизингу", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Посадить траву в теплице", bpBase: 4, bpVip: 8, autoCounter: null },
        { id: null, text: "Запустить переработку обезболивающих в лаборатории", bpBase: 4, bpVip: 8, autoCounter: null },
        { id: null, text: "Принять участие в двух аирдропах", bpBase: 4, bpVip: 8, autoCounter: null },
        { id: null, text: "3 победы в Дэнс Баттлах", bpBase: 2, bpVip: 4, autoCounter: null },
        { id: null, text: "Заказ материалов для бизнеса вручную (вкл/выкл)", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Арендовать киностудию", bpBase: 2, bpVip: 4, autoCounter: null },
        { id: null, text: "Прокрутить за DP серебрянный, золотой или driver кейс", bpBase: 10, bpVip: 20, autoCounter: null },
        { id: null, text: "Два раза оплатить смену внешности у хирурга в EMS", bpBase: 2, bpVip: 4, autoCounter: null },
        { id: null, text: "Добавить 5 видео в кинотеатре", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Выиграть 5 игр в тренировочном комплексе со ставкой", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Выиграть 3 любых игры на арене со ставкой", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Потушить 25 'огоньков' пожарным", bpBase: 1, bpVip: 2, autoCounter: null },
        { id: null, text: "Проехать 1 уличную гонку", bpBase: 1, bpVip: 2, autoCounter: null }
    ];

    // Счётчики с максимальными значениями (добавлен skins)
    const countersConfig = [
        { label: "Стройка", key: "build", max: 25, unit: "действий", taskId: "build" },
        { label: "Порт", key: "port", max: 25, unit: "действий", taskId: "port" },
        { label: "Ферма", key: "farm", max: 10, unit: "действий", taskId: "farm" },
        { label: "Шахта", key: "mine", max: 25, unit: "действий", taskId: "mine" },
        { label: "Шкуры животных", key: "skins", max: 5, unit: "шкур", taskId: "skins" },
        { label: "Рыбалка", key: "fish", max: 20, unit: "рыб", taskId: "fish" },
        { label: "Тренажёрный зал", key: "gym", max: 20, unit: "подходов", taskId: "gym" },
        { label: "Почта", key: "post", max: 10, unit: "посылок", taskId: "post" },
        { label: "Квесты клубов", key: "clubQuests", max: 2, unit: "квестов", taskId: "clubQuests" }
    ];

    // Состояние
    let isVip = false;
    let tasksChecked = new Array(tasksData.length).fill(false);
    let counters = {};
    let initialBpField = 0;
    
    countersConfig.forEach(c => { counters[c.key] = 0; });

    // Загрузка из localStorage
    function loadData() {
        const savedVip = localStorage.getItem("bptracker_vip_final2");
        if (savedVip !== null) isVip = savedVip === "true";
        
        const savedTasks = localStorage.getItem("bptracker_tasks_final2");
        if (savedTasks) {
            try {
                const parsed = JSON.parse(savedTasks);
                if (Array.isArray(parsed) && parsed.length === tasksData.length) tasksChecked = parsed;
            } catch(e) {}
        }
        
        const savedCounters = localStorage.getItem("bptracker_counters_final2");
        if (savedCounters) {
            try {
                const parsed = JSON.parse(savedCounters);
                countersConfig.forEach(c => { if (typeof parsed[c.key] === 'number') counters[c.key] = parsed[c.key]; });
            } catch(e) {}
        }
        
        const savedInitialField = localStorage.getItem("bptracker_initial_final2");
        if (savedInitialField !== null) {
            const parsed = parseInt(savedInitialField, 10);
            if (!isNaN(parsed)) initialBpField = parsed;
        }
    }
    
    function saveAll() {
        localStorage.setItem("bptracker_vip_final2", isVip);
        localStorage.setItem("bptracker_tasks_final2", JSON.stringify(tasksChecked));
        localStorage.setItem("bptracker_counters_final2", JSON.stringify(counters));
        localStorage.setItem("bptracker_initial_final2", initialBpField);
    }

    // Синхронизация отметки задания со счётчиком
    function syncTaskWithCounter(counterKey, counterValue) {
        const taskIndex = tasksData.findIndex(t => t.autoCounter === counterKey);
        if (taskIndex === -1) return false;
        
        const required = tasksData[taskIndex].required;
        const shouldBeChecked = counterValue >= required;
        
        if (tasksChecked[taskIndex] !== shouldBeChecked) {
            tasksChecked[taskIndex] = shouldBeChecked;
            return true;
        }
        return false;
    }

    // Обновление счётчика
    function updateCounter(key, delta) {
        const config = countersConfig.find(c => c.key === key);
        if (!config) return;
        
        let newValue = counters[key] + delta;
        if (newValue < 0) newValue = 0;
        if (newValue > config.max) newValue = config.max;
        
        if (counters[key] !== newValue) {
            counters[key] = newValue;
            syncTaskWithCounter(key, newValue);
            saveAll();
            renderAll();
        }
    }

    // Полный сброс счётчика
    function resetCounter(key) {
        if (counters[key] !== 0) {
            counters[key] = 0;
            syncTaskWithCounter(key, 0);
            saveAll();
            renderAll();
        }
    }

    // Функции для работы с исходным BP
    function setInitialBp(value) {
        let newValue = value;
        if (isNaN(newValue)) newValue = 0;
        if (newValue < 0) newValue = 0;
        if (initialBpField !== newValue) {
            initialBpField = newValue;
            saveAll();
            updateInitialBpInput();
        }
    }

    function addInitialBp(delta) {
        setInitialBp(initialBpField + delta);
    }

    function updateInitialBpInput() {
        const inputField = document.getElementById("initialBpInput");
        if (inputField && parseInt(inputField.value, 10) !== initialBpField) {
            inputField.value = initialBpField;
        }
    }

    // BP от заданий
    function getTasksBp() {
        let total = 0;
        for (let i = 0; i < tasksData.length; i++) {
            if (tasksChecked[i]) {
                total += isVip ? tasksData[i].bpVip : tasksData[i].bpBase;
            }
        }
        return total;
    }
    
    function getTotalBp() {
        return getTasksBp();
    }

    function updateTotalDisplay() {
        const totalSpan = document.getElementById("totalBpDisplay");
        if (totalSpan) totalSpan.textContent = getTotalBp();
        updateInitialBpInput();
    }

    // Рендер заданий
    function renderTasks() {
        const container = document.getElementById("tasksList");
        if (!container) return;
        container.innerHTML = "";
        
        tasksData.forEach((task, idx) => {
            const bpText = isVip ? `${task.bpVip} BP` : `${task.bpBase} BP`;
            const fullBp = `${task.bpBase}/${task.bpVip} BP`;
            const isAuto = task.autoCounter !== null;
            const isCompleted = tasksChecked[idx];
            
            const div = document.createElement("div");
            div.className = "task-item";
            
            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.className = "task-checkbox";
            cb.checked = isCompleted;
            cb.addEventListener("change", (e) => {
                tasksChecked[idx] = e.target.checked;
                saveAll();
                renderAll();
            });
            
            const contentDiv = document.createElement("div");
            contentDiv.className = "task-content";
            
            const textSpan = document.createElement("span");
            textSpan.className = "task-text";
            textSpan.innerHTML = task.text + (isAuto ? `<span class="auto-badge">счётчик</span>` : "");
            
            const bpSpan = document.createElement("span");
            bpSpan.className = "task-bp";
            bpSpan.textContent = `🎯 ${fullBp} • сейчас: ${bpText}`;
            
            contentDiv.appendChild(textSpan);
            contentDiv.appendChild(bpSpan);
            
            div.appendChild(cb);
            div.appendChild(contentDiv);
            container.appendChild(div);
        });
    }

    // Рендер счётчиков
    function renderCounters() {
        const container = document.getElementById("countersContainer");
        if (!container) return;
        container.innerHTML = "";
        
        countersConfig.forEach(c => {
            const currentVal = counters[c.key] || 0;
            const isMax = currentVal >= c.max;
            
            const row = document.createElement("div");
            row.className = "counter-row";
            
            const infoDiv = document.createElement("div");
            infoDiv.className = "counter-info";
            const labelSpan = document.createElement("span");
            labelSpan.className = "counter-label";
            labelSpan.textContent = c.label;
            const targetSpan = document.createElement("span");
            targetSpan.className = "counter-target";
            targetSpan.textContent = `📊 ${currentVal}/${c.max} ${c.unit}`;
            if (isMax) {
                targetSpan.style.color = "#8bc34a";
                targetSpan.innerHTML += ` <span style="font-size:10px;">✓ задание отмечено</span>`;
            }
            infoDiv.appendChild(labelSpan);
            infoDiv.appendChild(targetSpan);
            
            const controlsGroup = document.createElement("div");
            controlsGroup.className = "counter-controls-group";
            
            const minusBtn = document.createElement("button");
            minusBtn.textContent = "−";
            minusBtn.className = "counter-btn";
            minusBtn.addEventListener("click", () => updateCounter(c.key, -1));
            
            const valueSpan = document.createElement("span");
            valueSpan.className = "counter-value";
            valueSpan.textContent = currentVal;
            
            const plusBtn = document.createElement("button");
            plusBtn.textContent = "+";
            plusBtn.className = "counter-btn";
            plusBtn.addEventListener("click", () => updateCounter(c.key, 1));
            
            const resetSingleBtn = document.createElement("button");
            resetSingleBtn.textContent = "↺";
            resetSingleBtn.className = "counter-reset";
            resetSingleBtn.title = "Сбросить счётчик и снять отметку";
            resetSingleBtn.addEventListener("click", () => resetCounter(c.key));
            
            controlsGroup.appendChild(minusBtn);
            controlsGroup.appendChild(valueSpan);
            controlsGroup.appendChild(plusBtn);
            controlsGroup.appendChild(resetSingleBtn);
            
            row.appendChild(infoDiv);
            row.appendChild(controlsGroup);
            container.appendChild(row);
        });
    }

    function renderAll() {
        renderTasks();
        renderCounters();
        updateTotalDisplay();
    }

    function updateVipButtons() {
        const btns = document.querySelectorAll(".vip-option");
        btns.forEach(btn => {
            const isBtnVip = btn.dataset.vip === "true";
            if (isBtnVip === isVip) btn.classList.add("active");
            else btn.classList.remove("active");
        });
    }

    function resetAll() {
        tasksChecked.fill(false);
        countersConfig.forEach(c => { counters[c.key] = 0; });
        saveAll();
        renderAll();
    }

    // Инициализация
    loadData();
    
    // Синхронизация отметок со счётчиками при загрузке
    countersConfig.forEach(c => {
        syncTaskWithCounter(c.key, counters[c.key] || 0);
    });
    saveAll();
    
    // Настройка полей ввода исходного BP
    const inputField = document.getElementById("initialBpInput");
    if (inputField) {
        inputField.value = initialBpField;
        inputField.addEventListener("change", (e) => {
            let val = parseInt(e.target.value, 10);
            if (isNaN(val)) val = 0;
            if (val < 0) val = 0;
            setInitialBp(val);
        });
    }
    
    // Кнопки управления исходным BP
    document.getElementById("initialMinusBtn")?.addEventListener("click", () => addInitialBp(-1));
    document.getElementById("initialPlusBtn")?.addEventListener("click", () => addInitialBp(1));
    document.getElementById("initialAdd1Btn")?.addEventListener("click", () => addInitialBp(1));
    document.getElementById("initialAdd2Btn")?.addEventListener("click", () => addInitialBp(2));
    document.getElementById("initialAdd4Btn")?.addEventListener("click", () => addInitialBp(4));
    document.getElementById("initialAdd8Btn")?.addEventListener("click", () => addInitialBp(8));
    
    // VIP переключатель
    const vipBtns = document.querySelectorAll(".vip-option");
    vipBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            const newVip = btn.dataset.vip === "true";
            if (newVip !== isVip) {
                isVip = newVip;
                saveAll();
                updateVipButtons();
                renderAll();
            }
        });
    });
    
    document.getElementById("resetAllBtn")?.addEventListener("click", () => {
        if (confirm("Сбросить все отметки заданий и счётчики? Исходное BP останется неизменным.")) resetAll();
    });
    
    updateVipButtons();
    renderAll();
    
    document.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
</script>
</body>
</html>
