<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Квест-трекер · Графит</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background-color: #1a1c1e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            padding: 20px 16px 40px;
            color: #e8edf2;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* заголовок по центру */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.3px;
            margin-bottom: 12px;
        }

        /* общее количество BP вверху */
        .total-bp-card {
            background: #1e2124;
            border-radius: 20px;
            padding: 14px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .total-bp-label {
            font-size: 16px;
            color: #9aa3ae;
            font-weight: 500;
        }

        .total-bp-value {
            font-size: 32px;
            font-weight: 700;
            color: #F3CD49;
            letter-spacing: -0.5px;
        }

        /* VIP переключатель */
        .vip-switch {
            display: flex;
            gap: 8px;
            background: #232628;
            padding: 4px;
            border-radius: 40px;
            margin-bottom: 24px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .vip-option {
            padding: 8px 20px;
            border-radius: 32px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            color: #9aa3ae;
            border: none;
            font-family: inherit;
        }

        .vip-option.active {
            background: #F3CD49;
            color: #1a1c1e;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        /* список заданий */
        .tasks-list {
            margin-bottom: 32px;
            background: #1e2124;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 0.5px solid #2c3033;
            background-color: #1e2124;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            margin-top: 2px;
            flex-shrink: 0;
            cursor: pointer;
            accent-color: #F3CD49;
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            font-size: 15px;
            line-height: 1.4;
            color: #e8edf2;
            margin-bottom: 4px;
            display: block;
        }

        .task-bp {
            font-size: 12px;
            color: #F3CD49;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        /* счётчики прогресса */
        .counters-section {
            background: #1e2124;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .counters-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ffffff;
            padding-bottom: 6px;
            border-bottom: 0.5px solid #2c3033;
        }

        .counter-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 0.5px solid #2c3033;
            gap: 12px;
            flex-wrap: wrap;
        }

        .counter-row:last-child {
            border-bottom: none;
        }

        .counter-info {
            flex: 2;
            min-width: 120px;
        }

        .counter-label {
            font-size: 15px;
            font-weight: 500;
            color: #e8edf2;
            display: block;
            margin-bottom: 2px;
        }

        .counter-target {
            font-size: 11px;
            color: #F3CD49;
        }

        .counter-controls-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #2a2e32;
            padding: 4px 8px;
            border-radius: 40px;
        }

        .counter-btn {
            background: #3a3f44;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .counter-btn:active {
            background: #4f555b;
            transform: scale(0.96);
        }

        .counter-value {
            min-width: 44px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: #F3CD49;
        }

        .counter-reset {
            background: #2c3033;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            color: #9aa3ae;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
            touch-action: manipulation;
        }

        .counter-reset:active {
            background: #3a3f44;
            transform: scale(0.94);
            color: #F3CD49;
        }

        /* нижняя кнопка сброса всего */
        .reset-all-btn {
            background: #2c3033;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: #ff9f6e;
            font-size: 15px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
            touch-action: manipulation;
        }

        .reset-all-btn:active {
            background: #3a3f44;
            transform: scale(0.98);
        }

        .note {
            font-size: 11px;
            color: #6e7a8a;
            text-align: center;
            margin-top: 20px;
        }

        hr {
            border: none;
            height: 0.5px;
            background: #2c3033;
            margin: 12px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 Квест-трекер</h1>
    </div>

    <!-- общее количество BP вверху -->
    <div class="total-bp-card">
        <span class="total-bp-label">Всего получено BP</span>
        <span class="total-bp-value" id="totalBpTop">0</span>
    </div>

    <!-- переключатель VIP -->
    <div class="vip-switch">
        <button class="vip-option" data-vip="false">🔹 Без VIP</button>
        <button class="vip-option" data-vip="true">💎 С VIP</button>
    </div>

    <!-- список заданий -->
    <div class="tasks-list" id="tasksList"></div>

    <!-- счётчики прогресса -->
    <div class="counters-section">
        <div class="counters-title">📊 Счётчики прогресса</div>
        <div id="countersContainer"></div>
    </div>

    <!-- кнопка сброса всего -->
    <button class="reset-all-btn" id="resetAllBtn">⟳ Сбросить всё</button>
    <div class="note">✓ Отмечайте выполненные задания • Счётчики помогают отслеживать прогресс</div>
</div>

<script>
    // ---------- СПИСОК ЗАДАНИЙ ----------
    const tasksData = [
        { text: "3 часа в онлайне (можно многократно)", bpBase: 2, bpVip: 4 },
        { text: "Нули в казино", bpBase: 2, bpVip: 4 },
        { text: "25 действий на стройке", bpBase: 2, bpVip: 4 },
        { text: "25 действий в порту", bpBase: 2, bpVip: 4 },
        { text: "25 действий в шахте", bpBase: 2, bpVip: 4 },
        { text: "20 подходов в тренажерном зале", bpBase: 1, bpVip: 2 },
        { text: "Успешная тренировка в тире", bpBase: 1, bpVip: 2 },
        { text: "10 посылок на почте", bpBase: 1, bpVip: 2 },
        { text: "Купить лотерейный билет", bpBase: 1, bpVip: 2 },
        { text: "10 действий на ферме", bpBase: 1, bpVip: 2 },
        { text: "Выкопать 1 сокровище (не мусор)", bpBase: 1, bpVip: 2 },
        { text: "5 раз снять 100% шкуру с животных", bpBase: 2, bpVip: 4 },
        { text: "Поймать 20 рыб", bpBase: 4, bpVip: 8 },
        { text: "Выполнить 3 заказа дальнобойщиком", bpBase: 2, bpVip: 4 },
        { text: "2 круга на любом маршруте автобусника", bpBase: 2, bpVip: 4 },
        { text: "Посетить любой сайт в браузере", bpBase: 1, bpVip: 2 },
        { text: "Зайти в любой канал в Brawl", bpBase: 1, bpVip: 2 },
        { text: "Поставить лайк любой анкете в Match", bpBase: 1, bpVip: 2 },
        { text: "Кинуть мяч питомцу 15 раз", bpBase: 2, bpVip: 4 },
        { text: "15 выполненных питомцем команд", bpBase: 2, bpVip: 4 },
        { text: "Ставка в колесе удачи (межсерверное колесо)", bpBase: 3, bpVip: 6 },
        { text: "Сыграть в мафию в казино", bpBase: 3, bpVip: 6 },
        { text: "Выиграть гонку в картинге", bpBase: 1, bpVip: 2 },
        { text: "Проехать 1 станцию на метро", bpBase: 2, bpVip: 4 },
        { text: "Выполнить 2 квеста любых клубов", bpBase: 4, bpVip: 8 },
        { text: "Починить деталь в автосервисе", bpBase: 1, bpVip: 2 },
        { text: "Забросить 2 мяча в баскетболе", bpBase: 1, bpVip: 2 },
        { text: "Забить 2 гола в футболе", bpBase: 1, bpVip: 2 },
        { text: "Победить в армрестлинге", bpBase: 1, bpVip: 2 },
        { text: "Победить в дартс", bpBase: 1, bpVip: 2 },
        { text: "Поиграть 1 минуту в волейбол", bpBase: 1, bpVip: 2 },
        { text: "Поиграть 1 минуту в настольный теннис", bpBase: 1, bpVip: 2 },
        { text: "Поиграть 1 минуту в большой теннис", bpBase: 1, bpVip: 2 },
        { text: "Сделать платеж по лизингу", bpBase: 1, bpVip: 2 },
        { text: "Посадить траву в теплице", bpBase: 4, bpVip: 8 },
        { text: "Запустить переработку обезболивающих в лаборатории", bpBase: 4, bpVip: 8 },
        { text: "Принять участие в двух аирдропах", bpBase: 4, bpVip: 8 },
        { text: "3 победы в Дэнс Баттлах", bpBase: 2, bpVip: 4 },
        { text: "Заказ материалов для бизнеса вручную (вкл/выкл)", bpBase: 1, bpVip: 2 },
        { text: "Арендовать киностудию", bpBase: 2, bpVip: 4 },
        { text: "Прокрутить за DP серебрянный, золотой или driver кейс", bpBase: 10, bpVip: 20 },
        { text: "Два раза оплатить смену внешности у хирурга в EMS", bpBase: 2, bpVip: 4 },
        { text: "Добавить 5 видео в кинотеатре", bpBase: 1, bpVip: 2 },
        { text: "Выиграть 5 игр в тренировочном комплексе со ставкой (от 100$)", bpBase: 1, bpVip: 2 },
        { text: "Выиграть 3 любых игры на арене со ставкой (от 100$)", bpBase: 1, bpVip: 2 },
        { text: "Потушить 25 'огоньков' пожарным", bpBase: 1, bpVip: 2 },
        { text: "Проехать 1 уличную гонку (регистрация в телефоне, ставка ≥1000$)", bpBase: 1, bpVip: 2 }
    ];

    // Счётчики: название, ключ, необходимое количество, единица измерения
    const countersData = [
        { label: "Стройка", key: "build", target: 25, unit: "действий" },
        { label: "Порт", key: "port", target: 25, unit: "действий" },
        { label: "Ферма", key: "farm", target: 10, unit: "действий" },
        { label: "Шахта", key: "mine", target: 25, unit: "действий" },
        { label: "Рыбалка", key: "fish", target: 20, unit: "рыб" },
        { label: "Тренажёрный зал", key: "gym", target: 20, unit: "подходов" },
        { label: "Почта", key: "post", target: 10, unit: "посылок" }
    ];

    // Состояние
    let isVip = false;
    let tasksChecked = new Array(tasksData.length).fill(false);
    let counters = {};
    countersData.forEach(c => { counters[c.key] = 0; });

    // Загрузка из localStorage
    function loadData() {
        const savedVip = localStorage.getItem("graphite_vip_final");
        if (savedVip !== null) isVip = savedVip === "true";
        
        const savedTasks = localStorage.getItem("graphite_tasks_final");
        if (savedTasks) {
            try {
                const parsed = JSON.parse(savedTasks);
                if (Array.isArray(parsed) && parsed.length === tasksData.length) tasksChecked = parsed;
            } catch(e) {}
        }
        
        const savedCounters = localStorage.getItem("graphite_counters_final");
        if (savedCounters) {
            try {
                const parsed = JSON.parse(savedCounters);
                countersData.forEach(c => { if (typeof parsed[c.key] === 'number') counters[c.key] = parsed[c.key]; });
            } catch(e) {}
        }
    }
    
    function saveAll() {
        localStorage.setItem("graphite_vip_final", isVip);
        localStorage.setItem("graphite_tasks_final", JSON.stringify(tasksChecked));
        localStorage.setItem("graphite_counters_final", JSON.stringify(counters));
    }

    // BP за задание
    function getTaskBp(task, isChecked) {
        if (!isChecked) return 0;
        return isVip ? task.bpVip : task.bpBase;
    }
    
    function getTotalBp() {
        let total = 0;
        for (let i = 0; i < tasksData.length; i++) total += getTaskBp(tasksData[i], tasksChecked[i]);
        return total;
    }

    // Обновление отображения общего BP (вверху)
    function updateTotalDisplay() {
        const totalSpanTop = document.getElementById("totalBpTop");
        if (totalSpanTop) totalSpanTop.textContent = getTotalBp();
    }

    // Рендер заданий
    function renderTasks() {
        const container = document.getElementById("tasksList");
        if (!container) return;
        container.innerHTML = "";
        
        tasksData.forEach((task, idx) => {
            const bpText = isVip ? `${task.bpVip} BP` : `${task.bpBase} BP`;
            const fullBp = `${task.bpBase}/${task.bpVip} BP`;
            
            const div = document.createElement("div");
            div.className = "task-item";
            
            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.className = "task-checkbox";
            cb.checked = tasksChecked[idx];
            cb.addEventListener("change", (e) => {
                tasksChecked[idx] = e.target.checked;
                saveAll();
                updateTotalDisplay();
                // обновляем текст BP в этом же задании (если нужно, но меняется только сумма)
            });
            
            const contentDiv = document.createElement("div");
            contentDiv.className = "task-content";
            
            const textSpan = document.createElement("span");
            textSpan.className = "task-text";
            textSpan.textContent = task.text;
            
            const bpSpan = document.createElement("span");
            bpSpan.className = "task-bp";
            bpSpan.textContent = `🎯 ${fullBp} • сейчас: ${bpText}`;
            
            contentDiv.appendChild(textSpan);
            contentDiv.appendChild(bpSpan);
            
            div.appendChild(cb);
            div.appendChild(contentDiv);
            container.appendChild(div);
        });
    }

    // Рендер счётчиков с кнопкой сброса у каждого
    function renderCounters() {
        const container = document.getElementById("countersContainer");
        if (!container) return;
        container.innerHTML = "";
        
        countersData.forEach(c => {
            const row = document.createElement("div");
            row.className = "counter-row";
            
            const infoDiv = document.createElement("div");
            infoDiv.className = "counter-info";
            const labelSpan = document.createElement("span");
            labelSpan.className = "counter-label";
            labelSpan.textContent = c.label;
            const targetSpan = document.createElement("span");
            targetSpan.className = "counter-target";
            targetSpan.textContent = `нужно: ${c.target} ${c.unit}`;
            infoDiv.appendChild(labelSpan);
            infoDiv.appendChild(targetSpan);
            
            const controlsGroup = document.createElement("div");
            controlsGroup.className = "counter-controls-group";
            
            const minusBtn = document.createElement("button");
            minusBtn.textContent = "−";
            minusBtn.className = "counter-btn";
            minusBtn.addEventListener("click", () => {
                if (counters[c.key] > 0) {
                    counters[c.key]--;
                    saveAll();
                    renderCounters();
                    updateTotalDisplay();
                }
            });
            
            const valueSpan = document.createElement("span");
            valueSpan.className = "counter-value";
            valueSpan.textContent = counters[c.key];
            
            const plusBtn = document.createElement("button");
            plusBtn.textContent = "+";
            plusBtn.className = "counter-btn";
            plusBtn.addEventListener("click", () => {
                counters[c.key]++;
                saveAll();
                renderCounters();
                updateTotalDisplay();
            });
            
            const resetSingleBtn = document.createElement("button");
            resetSingleBtn.textContent = "↺";
            resetSingleBtn.className = "counter-reset";
            resetSingleBtn.title = "Сбросить счётчик";
            resetSingleBtn.addEventListener("click", () => {
                counters[c.key] = 0;
                saveAll();
                renderCounters();
                updateTotalDisplay();
            });
            
            controlsGroup.appendChild(minusBtn);
            controlsGroup.appendChild(valueSpan);
            controlsGroup.appendChild(plusBtn);
            controlsGroup.appendChild(resetSingleBtn);
            
            row.appendChild(infoDiv);
            row.appendChild(controlsGroup);
            container.appendChild(row);
        });
    }

    function updateVipButtons() {
        const btns = document.querySelectorAll(".vip-option");
        btns.forEach(btn => {
            const isBtnVip = btn.dataset.vip === "true";
            if (isBtnVip === isVip) btn.classList.add("active");
            else btn.classList.remove("active");
        });
    }

    function resetAll() {
        tasksChecked.fill(false);
        countersData.forEach(c => { counters[c.key] = 0; });
        saveAll();
        renderTasks();
        renderCounters();
        updateTotalDisplay();
    }

    // Инициализация VIP переключателя
    function initVipSwitcher() {
        const btns = document.querySelectorAll(".vip-option");
        btns.forEach(btn => {
            btn.addEventListener("click", () => {
                const newVip = btn.dataset.vip === "true";
                if (newVip !== isVip) {
                    isVip = newVip;
                    saveAll();
                    updateVipButtons();
                    renderTasks();      // обновляем текст BP у заданий
                    updateTotalDisplay();
                }
            });
        });
    }
    
    // Загрузка и старт
    loadData();
    renderTasks();
    renderCounters();
    initVipSwitcher();
    updateVipButtons();
    updateTotalDisplay();
    
    document.getElementById("resetAllBtn")?.addEventListener("click", () => {
        if (confirm("Сбросить все отметки заданий и счётчики?")) resetAll();
    });
    
    // защита от зума двойным тапом
    document.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
</script>
</body>
</html>
