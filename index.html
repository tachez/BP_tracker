<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Квест-трекер · VIP / без VIP</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            /* отключаем масштабирование при двойном тапе на интерактивных элементах */
            touch-action: manipulation;
        }

        body {
            background: #0b1120;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 16px 12px 40px;
            color: #eef2ff;
            /* дополнительная защита от зума */
            touch-action: pan-y pan-x;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e0e7ff, #a5b4fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0 0 6px 0;
        }

        .sub {
            font-size: 0.85rem;
            color: #8ca3cf;
            border-bottom: 1px solid #1e2a47;
            display: inline-block;
            padding-bottom: 4px;
        }

        /* VIP тумблер */
        .vip-toggle-card {
            background: #0f172ad9;
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 8px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #2d3a5e;
        }

        .vip-label {
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toggle-switch {
            display: flex;
            background: #1e293b;
            border-radius: 40px;
            padding: 4px;
            gap: 4px;
        }

        .toggle-option {
            padding: 6px 18px;
            border-radius: 32px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: transparent;
            color: #94a3b8;
            border: none;
            touch-action: manipulation;
        }

        .toggle-option.active {
            background: #facc15;
            color: #0f172a;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .stats-block {
            background: #1e293bb3;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-block span:first-child {
            color: #cbd5e6;
        }

        .stats-block span:last-child {
            font-weight: 800;
            color: #facc15;
            font-size: 1.3rem;
        }

        .reset-all-btn {
            background: #2d3a5e;
            border: none;
            color: #ffb86b;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            touch-action: manipulation;
        }

        .reset-all-btn:active {
            background: #3b4a72;
            transform: scale(0.97);
        }

        .actions-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .quest-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .quest-card {
            background: #0f172a;
            border-radius: 24px;
            padding: 14px 16px;
            border: 1px solid #25324e;
            transition: 0.1s ease;
        }

        .quest-main {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .quest-info {
            flex: 3;
            min-width: 170px;
        }

        .quest-title {
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.35;
            margin-bottom: 6px;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 8px;
        }

        .quest-name {
            color: #f1f5f9;
        }

        .bp-badge {
            background: #312e81;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #c7d2fe;
            white-space: nowrap;
        }

        .quest-desc {
            font-size: 0.75rem;
            color: #7e8bb6;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 4px;
        }

        .target-info {
            background: #1e293b;
            border-radius: 20px;
            padding: 2px 8px;
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 500;
            color: #94a3d8;
        }

        .bp-info {
            background: #2a2f4b;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #facc15;
        }

        .counter-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1e293b;
            padding: 6px 12px;
            border-radius: 60px;
            flex-shrink: 0;
        }

        .counter-btn {
            background: #334155;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            font-size: 1.6rem;
            font-weight: bold;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            touch-action: manipulation;
        }

        .counter-btn:active {
            background: #475569;
            transform: scale(0.94);
        }

        .counter-value {
            font-size: 1.4rem;
            font-weight: 700;
            min-width: 48px;
            text-align: center;
            color: #facc15;
            user-select: none;
            -webkit-user-select: none;
        }

        .reset-single {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #7c8ab3;
            padding: 4px 8px;
            border-radius: 30px;
            transition: 0.1s;
            touch-action: manipulation;
        }

        .reset-single:active {
            background: #2d3a5e;
            color: #ffb86b;
        }

        .quest-footer {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #1e2a47;
            padding-top: 8px;
            font-size: 0.75rem;
            flex-wrap: wrap;
            gap: 8px;
        }

        .status-done {
            color: #4ade80;
            font-weight: 500;
        }

        .status-progress {
            color: #facc15;
        }

        @media (max-width: 550px) {
            body {
                padding: 12px 10px 30px;
            }
            .quest-main {
                flex-direction: column;
            }
            .counter-controls {
                align-self: flex-start;
            }
            .actions-row {
                flex-direction: column;
                align-items: stretch;
            }
            .vip-toggle-card {
                justify-content: center;
            }
        }

        button, .toggle-option, .reset-all-btn, .counter-btn, .reset-single {
            font-family: inherit;
        }

        .footnote {
            text-align: center;
            font-size: 0.7rem;
            color: #4c5b82;
            margin-top: 32px;
        }

        /* запрещаем выделение текста на кнопках и счетчиках для лучшего UX */
        .counter-btn, .reset-single, .toggle-option, .reset-all-btn {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 Квест-трекер</h1>
        <div class="sub">BP: обычный / VIP (выбери свой режим)</div>
    </div>

    <div class="vip-toggle-card">
        <div class="vip-label">
            👑 Режим получения BP
        </div>
        <div class="toggle-switch" id="vipToggle">
            <button class="toggle-option" data-vip="false">🔹 Без VIP</button>
            <button class="toggle-option" data-vip="true">💎 С VIP</button>
        </div>
        <div class="stats-block">
            <span>🏆 Всего BP:</span>
            <span id="totalBpDisplay">0</span>
        </div>
    </div>

    <div class="actions-row">
        <button class="reset-all-btn" id="resetAllBtn">⟳ Сбросить всё</button>
        <div style="font-size:0.7rem; color:#6b7bb0;">⚡ + / – меняют прогресс. Сброс ⟳ обнуляет задание.</div>
    </div>

    <div class="quest-list" id="questListContainer"></div>
    <div class="footnote">✅ Задания с дробью 2/4 означают: без VIP = 2 BP, с VIP = 4 BP. Выбор VIP влияет на все задания. Данные автосохраняются.</div>
</div>

<script>
    // ---------------------- СПИСОК ЗАДАНИЙ --------------------------
    // Каждое задание: name, target (количество действий для полного выполнения), 
    // bpBase (BP без VIP), bpVip (BP c VIP), desc (опционально), repeatable (флаг)
    // Для заданий где указано 2/4 -> bpBase=2, bpVip=4
    // 1/2 -> bpBase=1, bpVip=2
    // 3/6 -> bpBase=3, bpVip=6
    // 4/8 -> bpBase=4, bpVip=8
    // 10/20 -> bpBase=10, bpVip=20

    const questsRaw = [
        { name: "3 часа в онлайне (можно многократно)", target: 1, bpBase: 2, bpVip: 4, desc: "многократно за день", repeatable: true },
        { name: "Нули в казино", target: 1, bpBase: 2, bpVip: 4, desc: "2/4 BP" },
        { name: "25 действий на стройке", target: 25, bpBase: 2, bpVip: 4, desc: "2/4 BP" },
        { name: "25 действий в порту", target: 25, bpBase: 2, bpVip: 4, desc: "2/4 BP" },
        { name: "25 действий в шахте", target: 25, bpBase: 2, bpVip: 4, desc: "2/4 BP" },
        { name: "20 подходов в тренажерном зале", target: 20, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Успешная тренировка в тире", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "10 посылок на почте", target: 10, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Купить лотерейный билет", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "10 действий на ферме (10 коров, пшеницы и т.д.)", target: 10, bpBase: 1, bpVip: 2, desc: "один способ в день" },
        { name: "Выкопать 1 сокровище (не мусор)", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "5 раз снять 100% шкуру с животных", target: 5, bpBase: 2, bpVip: 4, desc: "2/4 BP" },
        { name: "Поймать 20 рыб", target: 20, bpBase: 4, bpVip: 8, desc: "4/8 BP" },
        { name: "Выполнить 3 заказа дальнобойщиком", target: 3, bpBase: 2, bpVip: 4, desc: "2/4 BP" },
        { name: "2 круга на любом маршруте автобусника", target: 2, bpBase: 2, bpVip: 4, desc: "2/4 BP" },
        { name: "Посетить любой сайт в браузере", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Зайти в любой канал в Brawl", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Поставить лайк любой анкете в Match", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Кинуть мяч питомцу 15 раз", target: 15, bpBase: 2, bpVip: 4, desc: "2/4 BP" },
        { name: "15 выполненных питомцем команд", target: 15, bpBase: 2, bpVip: 4, desc: "2/4 BP" },
        { name: "Ставка в колесе удачи в казино (межсерверное колесо)", target: 1, bpBase: 3, bpVip: 6, desc: "3/6 BP" },
        { name: "Сыграть в мафию в казино", target: 1, bpBase: 3, bpVip: 6, desc: "3/6 BP" },
        { name: "Выиграть гонку в картинге", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Проехать 1 станцию на метро (2 станции = задание)", target: 2, bpBase: 2, bpVip: 4, desc: "нужно 2 станции" },
        { name: "Выполнить 2 квеста любых клубов", target: 2, bpBase: 4, bpVip: 8, desc: "4/8 BP" },
        { name: "Починить деталь в автосервисе", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Забросить 2 мяча в баскетболе", target: 2, bpBase: 1, bpVip: 2, desc: "1/2 BP (за 2 мяча)" },
        { name: "Забить 2 гола в футболе", target: 2, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Победить в армрестлинге", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Победить в дартс", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Поиграть 1 минуту в волейбол", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Поиграть 1 минуту в настольный теннис", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Поиграть 1 минуту в большой теннис", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Сделать платеж по лизингу", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Посадить траву в теплице", target: 1, bpBase: 4, bpVip: 8, desc: "4/8 BP" },
        { name: "Запустить переработку обезболивающих в лаборатории", target: 1, bpBase: 4, bpVip: 8, desc: "4/8 BP" },
        { name: "Принять участие в двух аирдропах", target: 2, bpBase: 4, bpVip: 8, desc: "4/8 BP" },
        { name: "3 победы в Дэнс Баттлах", target: 3, bpBase: 2, bpVip: 4, desc: "2/4 BP" },
        { name: "Заказ материалов для бизнеса вручную (вкл/выкл)", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Арендовать киностудию", target: 1, bpBase: 2, bpVip: 4, desc: "2/4 BP" },
        { name: "Прокрутить за DP серебрянный, золотой или driver кейс", target: 1, bpBase: 10, bpVip: 20, desc: "10/20 BP" },
        { name: "Два раза оплатить смену внешности у хирурга в EMS", target: 2, bpBase: 2, bpVip: 4, desc: "2/4 BP" },
        { name: "Добавить 5 видео в кинотеатре", target: 5, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Выиграть 5 игр в тренировочном комплексе со ставкой (от 100$)", target: 5, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Выиграть 3 любых игры на арене со ставкой (от 100$)", target: 3, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Потушить 25 'огоньков' пожарным", target: 25, bpBase: 1, bpVip: 2, desc: "1/2 BP" },
        { name: "Проехать 1 уличную гонку (регистрация в телефоне, ставка ≥1000$)", target: 1, bpBase: 1, bpVip: 2, desc: "1/2 BP" }
    ];

    // Глобальное состояние
    let isVip = false;          // false = без VIP, true = с VIP
    let questProgress = [];     // массив { current: число }

    // Загрузка из localStorage
    function loadData() {
        const savedVip = localStorage.getItem("questVipMode");
        if (savedVip !== null) isVip = savedVip === "true";
        
        const savedProgress = localStorage.getItem("questTrackerProgressV2");
        if (savedProgress) {
            try {
                const parsed = JSON.parse(savedProgress);
                if (Array.isArray(parsed) && parsed.length === questsRaw.length) {
                    questProgress = parsed;
                    return;
                }
            } catch(e) {}
        }
        // инициализация нулями
        questProgress = questsRaw.map(() => ({ current: 0 }));
    }

    function saveProgress() {
        localStorage.setItem("questVipMode", isVip);
        localStorage.setItem("questTrackerProgressV2", JSON.stringify(questProgress));
    }

    // Получить максимальное BP за задание (в зависимости от VIP)
    function getMaxBpForQuest(quest) {
        return isVip ? quest.bpVip : quest.bpBase;
    }

    // Получить текущее заработанное BP для конкретного задания (дробное, если не выполнено полностью)
    function getEarnedBpForQuest(idx) {
        const quest = questsRaw[idx];
        const prog = questProgress[idx];
        const current = prog.current;
        const maxBp = getMaxBpForQuest(quest);
        
        if (quest.repeatable) {
            // за каждое выполнение даёт полную награду (maxBp)
            return current * maxBp;
        } else {
            const target = quest.target;
            if (current >= target) return maxBp;
            // пропорционально выполнению
            return (current / target) * maxBp;
        }
    }

    // Общая сумма BP
    function getTotalBp() {
        let total = 0;
        for (let i = 0; i < questsRaw.length; i++) {
            total += getEarnedBpForQuest(i);
        }
        return total;
    }

    // отрисовать интерфейс
    function render() {
        const container = document.getElementById("questListContainer");
        if (!container) return;
        container.innerHTML = "";
        
        questsRaw.forEach((quest, idx) => {
            const prog = questProgress[idx];
            const current = prog.current;
            const target = quest.target;
            const maxBp = getMaxBpForQuest(quest);
            const earnedBp = getEarnedBpForQuest(idx);
            const isRepeat = quest.repeatable || false;
            
            // отображение BP дроби
            let bpDisplay = "";
            if (isRepeat) {
                bpDisplay = `🏆 ${earnedBp} BP (${current} раз(а) × ${maxBp})`;
            } else {
                if (current >= target) {
                    bpDisplay = `✅ ${maxBp}/${maxBp} BP`;
                } else {
                    bpDisplay = `🎯 ${earnedBp.toFixed(1)}/${maxBp} BP`;
                }
            }
            
            // статус прогресса
            let statusHtml = "";
            if (isRepeat) {
                statusHtml = `<span class="status-progress">♻️ выполнено ${current} раз(а)</span>`;
            } else {
                if (current >= target) {
                    statusHtml = `<span class="status-done">✔ полностью выполнено (${current}/${target})</span>`;
                } else {
                    statusHtml = `<span class="status-progress">📊 прогресс: ${current}/${target}</span>`;
                }
            }
            
            // доп информация о базовых BP
            const baseBpShow = quest.bpBase;
            const vipBpShow = quest.bpVip;
            const bpRange = isVip ? `${vipBpShow} BP (VIP)` : `${baseBpShow} BP (обычный)`;
            
            const card = document.createElement("div");
            card.className = "quest-card";
            card.innerHTML = `
                <div class="quest-main">
                    <div class="quest-info">
                        <div class="quest-title">
                            <span class="quest-name">${escapeHtml(quest.name)}</span>
                            <span class="bp-badge">${isRepeat ? '🔁 повторяемое' : '🎯 лимитное'}</span>
                        </div>
                        <div class="quest-desc">
                            <span class="target-info">🎯 ${isRepeat ? 'безлимит' : 'нужно: ' + target + ' раз'}</span>
                            <span class="bp-info">💎 ${baseBpShow}/${vipBpShow} BP • сейчас: ${bpRange}</span>
                        </div>
                        ${quest.desc ? `<div style="font-size:0.7rem; color:#6b7bb0;">📌 ${escapeHtml(quest.desc)}</div>` : ''}
                    </div>
                    <div class="counter-controls">
                        <button class="counter-btn decrement" data-idx="${idx}">−</button>
                        <span class="counter-value">${current}${isRepeat ? '' : (current > target ? ' /'+target : '')}</span>
                        <button class="counter-btn increment" data-idx="${idx}">+</button>
                        <button class="reset-single" data-idx="${idx}" title="Сбросить задание">⟳</button>
                    </div>
                </div>
                <div class="quest-footer">
                    ${statusHtml}
                    <div style="font-size:0.7rem;">${bpDisplay}</div>
                </div>
            `;
            container.appendChild(card);
        });
        
        // обновляем тотал
        const totalSpan = document.getElementById("totalBpDisplay");
        if (totalSpan) {
            totalSpan.innerText = getTotalBp().toFixed(1);
        }
        
        // навесить обработчики с предотвращением всплытия для защиты от зума (хотя CSS уже решает)
        document.querySelectorAll(".increment").forEach(btn => {
            btn.removeEventListener("click", incrementHandler);
            btn.addEventListener("click", incrementHandler);
        });
        document.querySelectorAll(".decrement").forEach(btn => {
            btn.removeEventListener("click", decrementHandler);
            btn.addEventListener("click", decrementHandler);
        });
        document.querySelectorAll(".reset-single").forEach(btn => {
            btn.removeEventListener("click", resetSingleHandler);
            btn.addEventListener("click", resetSingleHandler);
        });
        
        function incrementHandler(e) {
            e.preventDefault();
            const idx = parseInt(e.currentTarget.dataset.idx);
            if (isNaN(idx)) return;
            const q = questsRaw[idx];
            if (q.repeatable) {
                questProgress[idx].current += 1;
            } else {
                if (questProgress[idx].current < q.target) {
                    questProgress[idx].current += 1;
                }
            }
            saveProgress();
            render();
        }
        
        function decrementHandler(e) {
            e.preventDefault();
            const idx = parseInt(e.currentTarget.dataset.idx);
            if (isNaN(idx)) return;
            if (questProgress[idx].current > 0) {
                questProgress[idx].current -= 1;
            }
            saveProgress();
            render();
        }
        
        function resetSingleHandler(e) {
            e.preventDefault();
            const idx = parseInt(e.currentTarget.dataset.idx);
            if (isNaN(idx)) return;
            questProgress[idx].current = 0;
            saveProgress();
            render();
        }
    }
    
    // Обновить VIP режим и перерисовать
    function setVipMode(vipStatus) {
        isVip = vipStatus;
        saveProgress();
        render();
        updateToggleButtons();
    }
    
    function updateToggleButtons() {
        const btns = document.querySelectorAll(".toggle-option");
        btns.forEach(btn => {
            const btnVip = btn.dataset.vip === "true";
            if (btnVip === isVip) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
    }
    
    function resetAllQuests() {
        for (let i = 0; i < questProgress.length; i++) {
            questProgress[i].current = 0;
        }
        saveProgress();
        render();
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Инициализация
    loadData();
    render();
    
    // VIP переключатели
    const vipToggleContainer = document.getElementById("vipToggle");
    if (vipToggleContainer) {
        vipToggleContainer.addEventListener("click", (e) => {
            const btn = e.target.closest(".toggle-option");
            if (!btn) return;
            e.preventDefault();
            const newVip = btn.dataset.vip === "true";
            if (newVip !== isVip) {
                setVipMode(newVip);
            }
        });
    }
    
    const resetBtn = document.getElementById("resetAllBtn");
    if (resetBtn) {
        resetBtn.addEventListener("click", () => {
            if (confirm("Сбросить прогресс всех заданий? Все отметки обнулятся.")) {
                resetAllQuests();
            }
        });
    }
    
    updateToggleButtons();
    
    // дополнительная защита от двойного тапа на всей странице (для старых браузеров)
    document.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) {
            e.preventDefault();
        }
    }, { passive: false });
</script>
</body>
</html>
